name: Supabase Machine Refresh

on:
  schedule:
    # Monday 14:00-22:30 WIB (UTC+7) -> UTC 07:00-15:30
    - cron: "*/30 7-15 * * 1"
    # Tuesday-Thursday 06:00/06:30 WIB -> UTC 23:00/23:30 previous day
    - cron: "0,30 23 * * 1-3"
    # Tuesday-Thursday 07:00-22:30 WIB -> UTC 00:00-15:30
    - cron: "*/30 0-15 * * 2-4"
    # Friday-Sunday 06:00-06:50 WIB -> UTC 23:00-23:50 previous day
    - cron: "*/10 23 * * 4-6"
    # Friday-Sunday 07:00-22:50 WIB -> UTC 00:00-15:50
    - cron: "*/10 0-15 * * 5,6,0"
  workflow_dispatch:

concurrency:
  group: supabase-machine-refresh
  cancel-in-progress: false

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Supabase Edge Function
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          MACHINE_REFRESH_CRON_SECRET: ${{ secrets.MACHINE_REFRESH_CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST "${SUPABASE_PROJECT_URL}/functions/v1/machine-refresh" \
            -H "x-machine-refresh-secret: ${MACHINE_REFRESH_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
