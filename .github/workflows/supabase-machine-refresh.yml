name: Supabase Machine Refresh

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: supabase-machine-refresh
  cancel-in-progress: false

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Supabase Edge Function
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          MACHINE_REFRESH_CRON_SECRET: ${{ secrets.MACHINE_REFRESH_CRON_SECRET }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST "${SUPABASE_PROJECT_URL}/functions/v1/machine-refresh" \
            -H "x-machine-refresh-secret: ${MACHINE_REFRESH_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}'
